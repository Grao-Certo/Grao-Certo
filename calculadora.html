<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Financeiro</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h3>BENEFÍCIOS DO NOSSO SERVIÇO</h3>
    <h1>SIMULADOR FINANCEIRO</h1>
    <p>Descubra em quanto tempo sua operação começa a gerar lucro</p>

    <div class="container">

        <div class="input-group">
            <label>QUANTIDADE DE SILOS</label>
            <input type="number" id="ipt_qtd_silos">
        </div><br>

        <div class="input-group">
            <label>CAPACIDADE DO(S) SILO(S) (EM TONELADAS)</label>
            <input type="number" id="ipt_cap_silos">
        </div><br>

        <div class="input-group">
            <label>PREÇO MÉDIO DO MILHO (R$ POR TONELADA)</label>
            <input type="number" id="ipt_preco_milho">
        </div><br>

        <div class="input-group">
            <label>TEMPO DE INSPEÇÃO MANUAL POR SILO (HORAS POR MÊS)</label>
            <input type="number" id="ipt_tempo_inspecao">
        </div><br>

        <div class="alerta">
            <b>*ATENÇÃO:</b> Insira mais de 1 silo apenas se possuírem a mesma capacidade.
        </div><br>

        <button onclick="calcularLucros()">CALCULAR RETORNO</button> 

        <div id="id_mensagem"></div>

    </div>

</body>
</html>

<script>
    /*
    Considerações

    Salário médio operador de silo: 20R$ / hora
    Redução do tempo de inspeção: 70% (Considerando apenas verificações esporádicas)
    */
    function calcularLucros(){
        let qtdSilos = Number(ipt_qtd_silos.value)
        let capacidadeSilo = Number(ipt_cap_silos.value)
        let precoMilho = Number(ipt_preco_milho.value)
        let tempoInspecao = Number(ipt_tempo_inspecao.value)

        // Premissas
        let custoSolucao = 3000
        let perdasEvitadasKgPorTonAno = 100 // Perdas totais estimadas em 15%, estimamos melhorar 10%: 10% * 1ton = 100kg
        let reducaoPercentualInspecao = 0.7
        let custoHora = 20

        // Custo total
        let custoTotal = custoSolucao * qtdSilos

        // Economia por reduzir a inspeção manual
        let economiaInspecaoMensal = qtdSilos * tempoInspecao * reducaoPercentualInspecao * custoHora// Economia mensal 
        let economiaInspecaoAnual = economiaInspecaoMensal * 12 // Economia anual

        // Economia por perdas evitadas
        let perdasEvitadasAno = qtdSilos * capacidadeSilo * perdasEvitadasKgPorTonAno // perdas evitadas por ano (kg)
        let perdasEvitadasTonAno = perdasEvitadasAno / 1000 // converter kg pra toneladas
        let economiaPerdasAnual = perdasEvitadasTonAno * precoMilho // economia anual por perdas evitadas

        // Economia total
        let economiaTotalAnual = economiaInspecaoAnual + economiaPerdasAnual;
        let economiaTotalMensal = (economiaTotalAnual / 12).toFixed();

        // Payback
        let paybackMeses = 0
        if (economiaTotalMensal > 0){
            paybackMeses = (custoTotal / economiaTotalMensal).toFixed()
        };

        // Faturamento
        let faturamento12Meses = economiaTotalAnual - custoTotal;

        id_mensagem.innerHTML = `
            <br><b>RESULTADOS</b><br>
            <b>Custo total:</b> R$${custoTotal.toLocaleString("pt-BR", {minimumFractionDigits: 2})}<br>
            <b>Economia anual (inspeção):</b> R$${economiaInspecaoAnual.toLocaleString("pt-BR", {minimumFractionDigits: 2})}<br>
            <b>Economia anual (perdas evitadas):</b> R$${economiaPerdasAnual.toLocaleString("pt-BR", {minimumFractionDigits: 2})}<br>
            <b>Economia anual total:</b> R$${economiaTotalAnual.toLocaleString("pt-BR", {minimumFractionDigits: 2})} 
            (R$${Number(economiaTotalMensal).toLocaleString("pt-BR", {minimumFractionDigits: 2})} / mês)<br>
            <b>Payback estimado:</b> ${paybackMeses} meses<br>
            <b>Faturamento em 12 meses:</b> R$${faturamento12Meses.toLocaleString("pt-BR", {minimumFractionDigits: 2})}
        `
    };
</script>
