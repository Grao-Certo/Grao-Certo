<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imgs/logo_favicon.png" type="image/x-icon">
    <title>Grão Certo | Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>

<body class="bodyLoginCad">

    <header class="LoginCadastro">
            <a href="index.html"><img src="imgs/logo_grãocerto2.png" alt="logo da grão certo" id="logo"></a>
            <ul>
                <li><a href="index.html">HOME</a></li> 
                <li><a href="">NOSSA SOLUÇÃO</a></li> 
                <li><a href="">SOBRE NÓS</a></li>
                <li><a href="">CONTATOS</a></li>
            </ul>
        </header>

    <div class="container-Cadastro"> <!--PAI-->
        <div class="parteEsquerda">
            <img src="imgs/logo_grãocerto.png">

            <h1> JÁ TEM UMA <br> CONTA?</h1>

            <hr>

            <h3> BEM-VINDO DE VOLTA! </h3>
            <a href="Login.html"><button> L O G I N </button></a>
        </div>

        <div class="parteDireita">
            <div class="formulario">
                <h1> CRIAR CONTA </h1>
                <input type="text" name="" id="input_nome" placeholder="Nome"> <br>
                <input type="password" name="" id="input_senha" placeholder="Senha" oninput="verificar()">
                <br><input type="email" name="" id="input_email" placeholder="Email"> <br>
                <input type="text" name="" id="input_cpf" placeholder="Documento"> <br>
                <input type="text" name="" id="input_pessoa" placeholder="pessoa"> <br>
                <input type="text" name="" id="input_cep" placeholder="CEP"> <br>
                <input type="text" name="" id="input_empresa" placeholder="Empresa"> <br>

                <br>
                <button onclick="cadastrar()"> C A D A S T R A R </button>
            </div>
        </div>
    </div>

</body>
</html>
