<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/imgs/logo_favicon.png" type="image/x-icon">
    <title>Grão Certo | Cadastro de Usúario</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/validacoes.js"></script>
    <script src="../js/sessao.js"></script>
    <script src="../js/buscar.js"></script>
</head>

<body class="cadastro-admin" onload="validarSessao(); buscarSilos();"> 

    <aside class="dashboard-sidebar">

        <a href="index.html"><img src="../assets/imgs/logo_grãocerto.png" class="logo-sidebar"></a>

        <div class="usuario">
            <div class="icone-usuario">
                <img src="../assets/imgs/perfil_dash.svg" alt="Foto de perfil do usuário">
            </div>
            <h3 id="b_usuario">ARMAZENS PAULISTAS SA</h3>
            <p id="b_email">contato@armazenspaulistas.com</p>
        </div>

        <ul class="menu">

            <li class="menu-item" onclick="toggleMenu(this)">
                <span class="seta">▶</span> DASHBOARD
                <ul class="submenu" id="ul_submenu">
                    <li> <a href="dashboardGeral.html">AVISOS</a> </li>
                    <li> <a href="cadastroSilos.html">CADASTRAR NOVO SILO</a> </li>
                    <li> <a href="cadastroUsuario.html" id="active">CADASTRAR NOVO USUÁRIO</a> </li>
                </ul>
            </li>
        </ul>

    </aside>

    <div class="container-Cadastro-silo"> <!--PAI-->

        <div class="formulario">
            <h1> CADASTRAR USUÁRIO </h1>
            <label for="select_usuario">Tipo Usuário:</label>
            <select id="select_usuario">
                <option selected disabled> Selecione</option>
                <option>Administrador</option>
                <option>Operador</option>
            </select><br>
            <input type="text" id="input_nome" placeholder="Nome completo"> <br>
            <input type="text" id="input_cpf" placeholder="CPF: xxx.xxx.xxx-xx" oninput="mascaraCPF(this)" maxlength="14"> <br>
            <input type="email" id="input_email" placeholder="email"> <br>
            <input type="password" id="input_senha" placeholder="Senha" oninput="verificar()"><br>
            <input type="password" id="input_confirmarSenha" placeholder="Confirmar senha"><br>

            <div id="div_mensagem"></div>
            <div id="div_mensagem2"></div>
            <button onclick="cadastrarUsuario()"> C A D A S T R A R </button>
        </div>
    </div>

</body>

</html>

<script>
    function toggleMenu(element) {
        element.classList.toggle("ativo");
    }

</script>
