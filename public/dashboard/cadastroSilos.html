<!DOCTYPE html>
<html lang="pt-br">

<head>

    <title>Grão Certo | Cadastro de Silo</title>
    <link rel="stylesheet" href="../css/style.css">

<body class="cadastrarSilo">

    <aside class="dashboard-sidebar">

        <a href="index.html"><img src="../assets/imgs/logo_grãocerto.png" class="logo-sidebar"></a>

        <div class="usuario">
            <div class="icone-usuario">
                <img src="../assets/imgs/perfil_dash.svg" alt="Foto de perfil do usuário">
            </div>
            <h3 id="b_usuario">ARMAZENS PAULISTAS SA</h3>
            <p id="b_email">contato@armazenspaulistas.com</p>
        </div>

        <ul class="menu">

            <li class="menu-item" onclick="toggleMenu(this)">
                <span class="seta">▶</span> DASHBOARD

        <div class="formulario">

            <label for="select_silo">Tipo de silo:</label>

            </select><br>
            <input type="text" id="input_altura" placeholder="Altura Total"> <br>
            <input type="text" id="input_comprimento" placeholder="Comprimento"> <br>
            <input type="email" id="input_largura" placeholder="Largura"> <br>
            <input type="text" id="input_raio" placeholder="Raio"><br>
            <input type="text" id="input_alturaCone" placeholder="Altura Cone"><br>

            <div id="div_mensagem"></div>
            <div id="div_mensagem2"></div>
            <button onclick="cadastrarSilo()"> C A D A S T R A R </button>
        </div>
    </div>
