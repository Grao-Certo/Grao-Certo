<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grão Certo | Dashboard</title>
    <link rel="shortcut icon" href="../assets/imgs/logo_favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <script src="../js/sessao.js"></script>
    <script src="../js/buscar.js"></script>
</head>

<body class="dashboard-body" onload="validarSessao()">

    <div class="dashboard-layout">

        <aside class="dashboard-sidebar">

            <a href="../index.html"><img src="../assets/imgs/logo_grãocerto.png" class="logo-sidebar"></a>

            <div class="usuario">
                <div class="icone-usuario">
                    <img src="../assets/imgs/perfil_dash.svg" alt="Foto de perfil do usuário">
                </div>
                <h3 id="b_usuario">ARMAZENS PAULISTAS SA</h3>
                <p id="b_email">contato@armazenspaulistas.com</p>
            </div>

            <ul class="menu">

                <li class="menu-item" onclick="toggleMenu(this)">
                    <span class="seta">▶</span> DASHBOARD
                    <ul class="submenu" id="ul_submenu">
                        <li> <a href="dashboardGeral.html" id="active">AVISOS</a> </li>
                        <!-- <div id="admin"></div> -->
                        <li> <a href="cadastroSilos.html">CADASTRAR NOVO SILO</a> </li>
                        <li> <a href="cadastroUsuario.html">CADASTRAR NOVO USUÁRIO</a> </li>
                        <li> <a href="dashboardSilo1.html">SILO 1</a> </li>
                        <li> <a href="dashboardSilo2.html">SILO 2</a> </li>
                        <li> <a href="dashboardSilo3.html">SILO 3</a> </li>
                    </ul>
                </li>

                <li class="menu-item" onclick="limparSessao()">
                    Sair
                </li>
            </ul>



        </aside>

        <main class="dashboard-conteudo">
            <div class="cards-topo">
                <div class="card-topo">
                    <h3 class="titulo-card">TOTAL SILOS</h3>
                    <span style="color: green;">3</span>
                </div>

                <div class="card-topo">
                    <h3 class="titulo-card">TOTAL ARMAZENADO</h3>
                    <span>120,5 <small>TON</small></span>
                </div>

                <div class="card-topo">
                    <h3 class="titulo-card">SILOS EM ALERTA</h3>
                    <span style="color:red;">2</span>
                </div>
            </div>

            <div class="full-width alert">
                <span class="alerta-titulo">ALERTA PRIORITÁRIO</span>

                <div class="alerta-silos">
                    <input type="text" class="silo-input critico" value="Silo 1: 95% - Risco de superlotação" readonly>
                    <input type="text" class="silo-input atencao" value="Silo 2: 10% - Nível baixo" readonly>
                </div>
            </div>

            <div class="card-container full-width">
                <h3 class="titulo-card">VOLUME ATUAL DOS SILOS</h3>
                <div class="dashboard-card">
                    <div class="grafico-container">
                        <canvas id="grafico1"></canvas>
                    </div>
                </div>
            </div>
        </main>

    </div>

</body>

</html>

<script>

    buscarSilos();

    function toggleMenu(element) {
        element.classList.toggle("ativo");
    }

    const ctx1 = document.getElementById('grafico1');

    new Chart(ctx1, {
        type: 'bar',
        data: {
            labels: ['SILO 1', 'SILO 2', 'SILO 3'],
            datasets: [{
                data: [95, 10, 62],
                backgroundColor: ['#7f0d0d', '#f1ae00', '#324001']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    callbacks: {
                        label: function (context) {
                            return context.raw + '%';
                        }
                    }
                },
                datalabels: {
                    anchor: 'end',
                    align: 'top',
                    formatter: function (value) {
                        return value + '%';
                    },
                    font: {
                        weight: 'bold',
                        size: 14
                    }
                }
            }
        },
        plugins: [ChartDataLabels]
    });
</script>
