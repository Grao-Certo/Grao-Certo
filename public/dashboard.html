<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grão Certo | Dashboard</title>

    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dashboard-body">

    <div class="dashboard-layout">

        <aside class="dashboard-sidebar">

            <img src="assets/imgs/logo_grãocerto.png" class="logo-sidebar">

            <div class="usuario">
                <div class="icone-usuario"></div>
                <h3>ARMAZENS PAULISTAS SA</h3>
                <p>contato@armazenspaulistas.com</p>
            </div>

            <ul class="menu">

                <li class="menu-item" onclick="toggleMenu(this)">
                    <span class="seta">▶</span> DASHBOARD
                    <ul class="submenu">
                        <li>SILO 1</li>
                        <li>SILO 2</li>
                    </ul>
                </li>

            </ul>

            <div class="acoes">
                <button>GERAR RELATÓRIO</button>
                <button>CONFIGURAR ALERTAS</button>
            </div>

        </aside>

        <main class="dashboard-conteudo">
            <div class="card-container">
                <h3 class="titulo-card">VOLUME ATUAL</h3>
                <div class="dashboard-card">
                    <div class="grafico-container">
                        <canvas id="grafico1"></canvas>
                    </div>
                </div>
            </div>
            <div class="card-container">
                <h3 class="titulo-card">ALTERAÇÕES DE ESTOQUE</h3>
                <div class="dashboard-card">
                    <div class="grafico-container">
                        <canvas id="grafico2"></canvas>
                    </div>
                </div>
            </div>
            <div class="card-container">
                <h3 class="titulo-card">VOLUME ATUAL</h3>

                <div class="dashboard-card">
                    <div class="grafico-container">
                        <canvas id="grafico3"></canvas>
                    </div>

                    <div class="info-container">
                        <h3>Última atualização</h3>
                        <input type="text">
                    </div>
                </div>
            </div>
        </main>

    </div>

</body>

</html>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

    function toggleMenu(element) {
        element.classList.toggle("ativo");
    }

    const ctx1 = document.getElementById('grafico1');
    const ctx2 = document.getElementById('grafico2');
    const ctx3 = document.getElementById('grafico3');

    const valor = 72.5;

    const pluginTextoCentro = {
        id: 'textoCentro',
        beforeDraw(chart) {
            const { ctx, chartArea } = chart;
            const valor = chart.data.datasets[0].data[0];

            ctx.save();

            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#333';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const x = (chartArea.left + chartArea.right) / 2;
            const y = (chartArea.top + chartArea.bottom) / 1.2;

            let texto = valor.toString().replace('.', ',');
            ctx.fillText(texto + ' TON', x, y);

            ctx.restore();
        }
    };

    new Chart(ctx3, {
        type: 'doughnut',
        data: {
            labels: ['Usado', 'Livre'],
            datasets: [{
                data: [valor, 100 - valor],
                backgroundColor: ['#324001', '#8BC34A'],
                borderWidth: 0
            }]
        },
        options: {
            rotation: -90,          // começa de baixo
            circumference: 180,     // só metade
            cutout: '70%',          // espaço interno (o "buraco")
            plugins: {
                legend: {
                    display: false
                }
            },
            responsive: true,
            maintainAspectRatio: false
        },
        plugins: [pluginTextoCentro]
    });

    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: ['Silo 1', 'Silo 2', 'Silo 3'],
            datasets: [{
                label: 'Temperatura',
                data: [30, 28, 32],
                backgroundColor: '#8BC34A'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    new Chart(ctx1, {
        type: 'bar',
        data: {
            labels: ['Silo 1', 'Silo 2', 'Silo 3'],
            datasets: [{
                label: 'Temperatura',
                data: [30, 28, 32],
                backgroundColor: '#8BC34A'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
</script>
