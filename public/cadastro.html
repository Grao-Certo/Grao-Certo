<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/imgs/logo_favicon.png" type="image/x-icon">
    <title>Grão Certo | Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/validacoes.js"></script>
</head>

<body class="bodyLoginCad">

    <header class="barra">
        <a href="index.html"><img src="assets/imgs/logo_grãocerto.png" alt="logo da grão certo" id="logo"></a>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="index.html#nossa_solucao">NOSSA SOLUÇÃO</a></li>
            <li><a href="index.html#sobreNos">SOBRE NÓS</a></li>
            <li><a href="simulador.html#simulador-titulo-1">SIMULADOR</a></li>
        </ul>
    </header>
    <div class="container-Cadastro"> <!--PAI-->
        <div class="parteSuperior">
            <img src="assets/imgs/Logo_Grande.png">

            <h1> JÁ TEM UMA <br> CONTA?</h1>
            <hr>
            <h3> BEM-VINDO DE VOLTA! </h3>
            <a href="login.html"><button> L O G I N </button></a>

        </div>

        <div class="parteInferior">
            <div class="formulario">
                <h1> CADASTRAR EMPRESA </h1>

                <input type="text" name="" id="input_nome" placeholder="Nome da empresa"> <br>
                <input type="text" name="" id="input_cnpj" placeholder="CNPJ: xx.xxx.xxx/xxxx-xx" maxlength="18" oninput="mascaraCNPJ(this)"> <br>
                <input type="email" name="" id="input_email" placeholder="Email"> <br>
                <input type="text" name="" id="input_cep" placeholder="CEP: xxxx-xxx" oninput="mascaraCEP(this)" maxlength="9"><br>
                <input type="text" name="" id="input_numero" placeholder="Número"><br>
                <input type="text" name="" id="input_complemento" placeholder="Complemento"><br>
                <input type="password" id="input_senha" placeholder="Senha" oninput="verificar()"><br>
                <input type="password" id="input_confirmarSenha" placeholder="Confirmar senha"><br>

                <div id="div_mensagem"></div>
                <div id="div_mensagem2"></div>
                <button onclick="cadastrarEmpresa()"> C A D A S T R A R </button>
            </div>
        </div>
    </div>

</body>

</html>
