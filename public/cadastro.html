<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/imgs/logo_favicon.png" type="image/x-icon">
    <title>Grão Certo | Cadastro</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="validacoes.js"></script>
</head>

<body class="bodyLoginCad">

    <header class="LoginCadastro">
            <a href="index.html"><img src="assets/imgs/logo_grãocerto.png" alt="logo da grão certo" id="logo"></a>
            <ul>
                <li><a href="index.html">HOME</a></li> 
                <li><a href="index.html#nossa_solucao">NOSSA SOLUÇÃO</a></li>
                <li><a href="index.html#sobreNos">SOBRE NÓS</a></li>
                <li><a href="simulador.html">SIMULADOR</a></li>
            </ul>
        </header>
    <div class="container-Cadastro"> <!--PAI-->
        <div class="parteSuperior">
            <img src="assets/imgs/Logo_Grande.png">

            <h1> JÁ TEM UMA <br> CONTA?</h1>
            <hr>
            <h3> BEM-VINDO DE VOLTA! </h3>
            <a href="login.html"><button> L O G I N </button></a>

        </div>

        <div class="parteInferior">
            <div class="formulario">
                <h1> CRIAR CONTA </h1>
                <label>Tipo de pessoa:</label>
                <select id="select_pessoa" onchange="colocarEmpresa()">
                    <option selected disabled> Selecione</option>
                    <option>Usuário</option>
                    <option>Empresa</option>
                </select><br>
                <input type="text" name="" id="input_nome" placeholder="Nome"> <br>
                <input type="text" name="" id="input_doc" placeholder="Documento" maxlength="14" oninput="mascaraCPF(this)"> <br>
                <input type="email" name="" id="input_email" placeholder="Email"> <br>
                <input type="text" name="" id="input_tipoUsu" placeholder="Tipo Usuário"> <br>
                <input type="password" name="" id="input_senha" placeholder="Senha" oninput="verificar()"><br>
                <input type="password" name="" id="input_confirmar_senha" placeholder="Confirme sua senha"><br>

                <div id="div_mensagem"></div>
                <div id="div_erro" style="color: red;"></div>
                <button onclick="cadastrar()"> C A D A S T R A R </button>
            </div>
        </div>
    </div>

</body>
</html>
