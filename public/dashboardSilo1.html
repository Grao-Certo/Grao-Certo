            <ul class="menu">

                <li class="menu-item" onclick="toggleMenu(this)">
                    <span class="seta">▶</span> DASHBOARD

        <main class="dashboard-conteudo">

            <div class="linha-dupla">
                <div class="card-container">

                <div class="card-container">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

    function toggleMenu(element) {
        element.classList.toggle("ativo");
    }

    const ctx1 = document.getElementById('grafico1');
    const ctx2 = document.getElementById('grafico2');
    const ctx3 = document.getElementById('grafico3');
    const ctx4 = document.getElementById('grafico4');
    const ctx5 = document.getElementById('grafico5');
    const ctx6 = document.getElementById('grafico6');



    function calcularEstoque() {
    let estoque = Number(document.getElementById('ipt_estoque').value);
    let valorTon = Number(document.getElementById('ipt_valorTon').value);

    let valorTotal = estoque * valorTon;

    document.getElementById('ipt_valorTotal').value =
        valorTotal.toLocaleString('pt-BR', {
            style: 'currency',
            currency: 'BRL'
        });
}

    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: ['JAN', 'FEV', 'MAR', 'ABR', 'MAI', 'JUN'],
            datasets: [{
                label: 'Volume mensal (TON)',
                data: [120, 150, 180, 90, 200, 170],
                backgroundColor: '#8BC34A'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    let capacidadeMax = 100;
    let volumeAtual = 72.5;

    let porcentagem = (volumeAtual / capacidadeMax) * 100;

    let pluginTextoCentro = {
        id: 'textoCentro',
        afterDraw: function (chart) {
            let ctx = chart.ctx;
            let chartArea = chart.chartArea;

            let x = (chartArea.left + chartArea.right) / 2;
            let y = (chartArea.top + chartArea.bottom) / 1.2;

            ctx.save();

            ctx.textAlign = 'center';

            // TON (principal)
            ctx.font = 'bold 18px Arial';
            ctx.fillStyle = '#333';
            ctx.fillText(volumeAtual.toFixed(1) + ' TON', x, y);

            // %
            ctx.font = '12px Arial';
            ctx.fillText(porcentagem.toFixed(1) + '%', x, y + 20);

            ctx.restore();
        }
    };

    new Chart(ctx3, {
        type: 'doughnut',
        data: {
            datasets: [{
                data: [porcentagem, 100 - porcentagem],
                backgroundColor: ['#324001', '#8BC34A'],
                borderWidth: 0
            }]
        },
        options: {
            rotation: -90,
            circumference: 180,
            cutout: '70%',
            plugins: {
                legend: { display: false }
            },
            responsive: true,
            maintainAspectRatio: false
        },
        plugins: [pluginTextoCentro]
    });

    new Chart(ctx4, {
        type: 'bar',
        data: {
            labels: ['DOMINGO', 'SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA', 'SÁBADO'],
            datasets: [{
                label: 'TON',
                data: [13, 28, 32, 48, 52, 64, 97],
                backgroundColor: '#8BC34A'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });


    let capMax = 100;
    let volAtu = 72.5;

    let percent = (volumeAtual / capacidadeMax) * 100;

    let pluginTextoCentral = {
        id: 'textoCentral',
        afterDraw: function (chart) {
            let ctx = chart.ctx;
            let chartArea = chart.chartArea;

            let x = (chartArea.left + chartArea.right) / 2;
            let y = (chartArea.top + chartArea.bottom) / 1.2;

            ctx.save();

            ctx.textAlign = 'center';

            // TON (principal)
            ctx.font = 'bold 18px Arial';
            ctx.fillStyle = '#333';
            ctx.fillText(volumeAtual.toFixed(1) + ' TON', x, y);

            // %
            ctx.font = '12px Arial';
            ctx.fillText(porcentagem.toFixed(1) + '%', x, y + 20);

            ctx.restore();
        }
    };

    new Chart(ctx5, {
        type: 'doughnut',
        data: {
            datasets: [{
                data: [percent, 100 - percent],
                backgroundColor: ['#324001', '#8BC34A'],
                borderWidth: 0
            }]
        },
        options: {
            rotation: 90,
            circumference: 360,
            cutout: '70%',
            plugins: {
                legend: { display: false }
            },
            responsive: true,
            maintainAspectRatio: false
        },
        plugins: [pluginTextoCentral]
    });

    let labs = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
    let vals = [25, 40, 60, 70, 80, 65, 55, 60, 60, 50, 45, 50];

    new Chart(ctx6, {
        type: 'bar',
        data: {
            labels: labs,
            datasets: [
                {
                    label: 'Volume atual (TON)',
                    data: vals,
                    backgroundColor: '#8BC34A'
                }
            ]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: true
                }
            }
        }
    });


</script>
